query Employees($dispensaryId: ID!, $status: String) {
  employees(dispensaryId: $dispensaryId, status: $status) {
    profileId
    userId
    firstName
    lastName
    email
    role
    isActive
    positionName
    department
    employeeNumber
    hourlyRate
    employmentType
    employmentStatus
    payType
    activeCerts
    expiringCerts
  }
}

mutation InviteStaff($input: InviteStaffInput!) {
  inviteStaff(input: $input) {
    user {
      id
      email
      role
      firstName
      lastName
      isActive
    }
    temporaryPassword
  }
}

mutation SetUserRole($userId: ID!, $role: String!) {
  setUserRole(userId: $userId, role: $role) {
    id
    role
  }
}

mutation DeactivateUser($userId: ID!) {
  deactivateUser(userId: $userId)
}

query StaffComplianceOverview($dispensaryId: ID!) {
  staffComplianceOverview(dispensaryId: $dispensaryId) {
    totalEmployees
    activeEmployees
    totalCerts
    activeCerts
    expiredCerts
    expiringSoon
    pendingCerts
  }
}
