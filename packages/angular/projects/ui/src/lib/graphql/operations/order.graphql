query Order($orderId: ID!, $dispensaryId: ID) {
  order(orderId: $orderId, dispensaryId: $dispensaryId) {
    orderId
    dispensaryId
    customerUserId
    orderType
    orderStatus
    subtotal
    discountTotal
    taxTotal
    total
    paymentMethod
    metrcReceiptId
    metrcSyncStatus
    notes
    cancellationReason
    cancelledAt
    createdAt
    updatedAt
  }
}
