mutation CreateProduct($input: CreateProductInput!) {
  createProduct(input: $input) {
    id
    name
  }
}

mutation UpdateProduct($input: UpdateProductInput!) {
  updateProduct(input: $input) {
    id
    name
  }
}

mutation UpdateVariantPrice($input: UpdateVariantPriceInput!) {
  updateVariantPrice(input: $input)
}

mutation DeleteProduct($productId: ID!, $dispensaryId: ID!) {
  deleteProduct(productId: $productId, dispensaryId: $dispensaryId)
}

mutation CreateProductVariant($input: CreateProductVariantInput!) {
  createProductVariant(input: $input) {
    variantId
    name
    sortOrder
    quantityPerUnit
    sku
    isActive
  }
}

mutation UpdateProductVariant($input: UpdateProductVariantInput!) {
  updateProductVariant(input: $input) {
    variantId
    name
    quantityPerUnit
    sku
    isActive
  }
}

mutation DeleteProductVariant($variantId: ID!, $dispensaryId: ID!) {
  deleteProductVariant(variantId: $variantId, dispensaryId: $dispensaryId)
}

mutation SetProductsActive(
  $dispensaryId: ID!
  $productIds: [ID!]!
  $isActive: Boolean!
) {
  setProductsActive(
    dispensaryId: $dispensaryId
    productIds: $productIds
    isActive: $isActive
  )
}

mutation DeleteProducts($dispensaryId: ID!, $productIds: [ID!]!) {
  deleteProducts(dispensaryId: $dispensaryId, productIds: $productIds)
}

mutation SetProductsSortOrder($dispensaryId: ID!, $orderedIds: [ID!]!) {
  setProductsSortOrder(dispensaryId: $dispensaryId, orderedIds: $orderedIds)
}
