query Products(
  $dispensaryId: ID!
  $categoryId: Int
  $productTypeId: Int
  $search: String
  $limit: Int = 50
  $offset: Int
) {
  products(
    dispensaryId: $dispensaryId
    categoryId: $categoryId
    productTypeId: $productTypeId
    search: $search
    limit: $limit
    offset: $offset
  ) {
    id
    name
    sku
    description
    shortDescription
    strainName
    strainType
    thcPercent
    cbdPercent
    effects
    flavors
    primaryCategoryId
    productTypeId
    brandId
    isActive
    isApproved
    variants {
      variantId
      name
      sku
      retailPrice
      stockQuantity
      stockStatus
      sortOrder
      isActive
    }
  }
}
