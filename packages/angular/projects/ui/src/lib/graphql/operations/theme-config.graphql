query ThemeConfig($dispensaryId: String!) {
  themeConfig(dispensaryId: $dispensaryId) {
    id
    dispensaryId
    preset
    primary
    secondary
    accent
    bgPrimary
    bgSecondary
    bgCard
    textPrimary
    textSecondary
    sidebarBg
    sidebarText
    success
    warning
    error
    info
    isDark
    displayFont
    bodyFont
    logoUrl
    mastheadUrl
  }
}

mutation SaveThemeConfig($input: SaveThemeConfigInput!) {
  saveThemeConfig(input: $input) {
    id
    preset
    primary
    secondary
    accent
    bgPrimary
    bgSecondary
    bgCard
    textPrimary
    textSecondary
    sidebarBg
    sidebarText
    success
    warning
    error
    info
    isDark
    displayFont
    bodyFont
    logoUrl
    mastheadUrl
  }
}

query MyThemableDispensaries {
  myThemableDispensaries {
    entityId
    name
    slug
    preset
    logoUrl
  }
}
