name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: test_user
          DATABASE_PASSWORD: test_password
          DATABASE_NAME: test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run e2e tests
        run: pnpm run test:e2e
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: test_user
          DATABASE_PASSWORD: test_password
          DATABASE_NAME: test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build project
        run: pnpm run build

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-api:latest
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Storefront
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.storefront
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-storefront:latest
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-storefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.vite
          build-args: APP=admin
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Staff
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.vite
          build-args: APP=staff
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-staff:latest
            ${{ secrets.DOCKER_USERNAME }}/cannasaas-staff:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.cannasaas.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/cannasaas-api:${{ github.sha }}"
          # Add actual deployment commands here (docker-compose pull + up, or k8s apply)

      - name: Smoke test staging
        run: |
          sleep 10
          curl -f https://staging.cannasaas.com/health || echo "Staging health check (configure URL)"
