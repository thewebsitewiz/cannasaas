<!doctype html>
<html lang="en" data-theme="modern" data-preview-depth="1">
<head><meta charset="utf-8"><title>Open register — Staff POS</title><link rel="stylesheet" href="../_assets/preview.css"></head>
<body style="background:var(--color-bg-alt);min-height:100vh;display:grid;place-items:center;">

<div class="tp-card" style="max-width:420px;width:100%;padding:2rem;">
  <h1 style="margin-bottom:0.25rem;">Open register</h1>
  <small>Count cash on hand. Once opened you can take orders.</small>
  <div class="tp-field" style="margin-top:1.5rem;"><label>Register</label><select class="tp-select"><option>Register #1</option><option selected>Register #2</option><option>Register #3</option></select></div>
  <div class="tp-field"><label>Opening cash</label><input class="tp-input" value="$300.00"></div>
  <div class="tp-field"><label>Notes</label><textarea class="tp-textarea" rows="3" placeholder="Optional"></textarea></div>
  <button type="button" class="tp-btn">Open register</button>
</div>
<script src="../_assets/theme-switch.js"></script>
</body></html>
