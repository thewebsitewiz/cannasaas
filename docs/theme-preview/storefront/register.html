<!doctype html>
<html lang="en" data-theme="modern" data-preview-depth="1">
<head><meta charset="utf-8"><title>Register — GreenLeaf</title><link rel="stylesheet" href="../_assets/preview.css"></head>
<body style="background:var(--color-bg-alt);min-height:100vh;display:grid;place-items:center;">

<div class="tp-card" style="max-width:420px;width:100%;padding:2rem;">
  <h1>Create your account</h1>
  <small>Required by NY state for cannabis purchases.</small>
  <div class="tp-grid tp-grid-2" style="margin-top:1.5rem;gap:0.75rem;">
    <div class="tp-field"><label>First name</label><input class="tp-input"></div>
    <div class="tp-field"><label>Last name</label><input class="tp-input"></div>
  </div>
  <div class="tp-field"><label>Email</label><input class="tp-input" type="email"></div>
  <div class="tp-field"><label>Password</label><input class="tp-input" type="password"></div>
  <div class="tp-field"><label>Date of birth</label><input class="tp-input" type="date"></div>
  <button class="tp-btn" style="width:100%;">Create account</button>
</div>
<script src="../_assets/theme-switch.js"></script>
</body></html>
