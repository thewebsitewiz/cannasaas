<!doctype html>
<html lang="en" data-theme="modern" data-preview-depth="1">
  <head>
    <meta charset="utf-8" />
    <title>Login — Admin</title>
    <link rel="stylesheet" href="../_assets/preview.css" />
    <style>
      .auth { min-height: 100vh; display: grid; place-items: center; background: var(--color-bg-alt); }
      .auth__card { width: 100%; max-width: 360px; padding: 2rem; }
    </style>
  </head>
  <body>
    <div class="auth">
      <div class="auth__card tp-card">
        <h1 style="margin-bottom: 0.25rem;">CannaSaaS Admin</h1>
        <small>Sign in to your dispensary back-office.</small>
        <form style="margin-top: 1.5rem;">
          <div class="tp-field">
            <label for="email">Email</label>
            <input class="tp-input" id="email" type="email" value="admin@greenleaf.com" />
          </div>
          <div class="tp-field">
            <label for="pw">Password</label>
            <input class="tp-input" id="pw" type="password" value="••••••••" />
          </div>
          <button type="button" class="tp-btn" style="width: 100%;">Sign in</button>
          <p style="margin-top: 1rem; text-align: center;">
            <small>Need access? Contact your org administrator.</small>
          </p>
        </form>
      </div>
    </div>
    <script src="../_assets/theme-switch.js"></script>
  </body>
</html>
