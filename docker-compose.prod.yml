# ═══════════════════════════════════════════════════════════════════════════
# CannaSaas — Docker Compose Production Stack
# Usage: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

version: '3.9'

services:
  # ── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cannasaas
      POSTGRES_USER: cannasaas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cannasaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cannasaas:${DB_PASSWORD:-changeme}@postgres:5432/cannasaas
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/graphql?query=%7B__typename%7D"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Storefront (Next.js) ─────────────────────────────────────────────────
  storefront:
    build:
      context: .
      dockerfile: deploy/Dockerfile.storefront
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${STOREFRONT_URL:-http://localhost:3000}
      NEXT_PUBLIC_GRAPHQL_URL: ${STOREFRONT_URL:-http://localhost:3000}/graphql
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"

  # ── Admin Portal (Vite → nginx) ─────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: deploy/Dockerfile.vite
      args:
        APP: admin
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:80"

  # ── Staff Portal (Vite → nginx) ─────────────────────────────────────────
  staff:
    build:
      context: .
      dockerfile: deploy/Dockerfile.vite
      args:
        APP: staff
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3003:80"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - storefront
      - admin
      - staff

volumes:
  pgdata:
  redisdata:
