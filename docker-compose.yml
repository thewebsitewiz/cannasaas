# ═══════════════════════════════════════════════════════════════════════════
# CannaSaas — Docker Compose Local Dev (DB + Redis only)
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════════════════

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cannasaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cannasaas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cannasaas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
